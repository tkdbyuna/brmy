<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg"><title>Card · Break My Case</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head><body>
<header class="topbar">
  <a class="backlink" href="index.html">← Archive</a>
  <nav class="vtabs">
    <a class="vtab" href="banner.html">Banner</a>
    <a class="vtab on" href="cards.html">Card</a>
  </nav>
</header>

<div class="wrap">
  <div class="cardbar">
    <div class="crow">
      <div class="seg" id="f-rarity"></div>
      <div class="seg" id="f-type"></div>
      <div class="seg"><button class="segbtn" id="f-limited" data-lim="1">Limited</button><button class="segbtn" id="f-birthday">Birthday</button><button class="segbtn" id="f-anniversary">Anniversary</button><button class="segbtn" id="f-reward">Reward</button></div>
      <span class="barspace"></span>
      <div class="iconseg">
        <button class="iconbtn" id="clearFilters" title="Clear filters" aria-label="Clear filters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button class="iconbtn" id="exportBtn" title="Export collection" aria-label="Export collection">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>
        <button class="iconbtn" id="importBtn" title="Import collection" aria-label="Import collection">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 8l5-5 5 5"/><path d="M12 3v12"/></svg>
        </button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </div>
    <div class="crow">
      <select id="f-char" class="sel"><option value="">All characters</option></select>
      <div class="seg" id="f-sort"></div>
      <span id="ownCircles"></span>
    </div>
  </div>
  <div class="cardcount mono" id="cardcount"></div>
  <div id="cardgrid" class="collectgrid"></div>
</div>

<footer>
  Collection data is saved in this browser only. Use Export to back it up or move it between devices.
</footer>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modalbox">
    <button class="modalclose" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const ACCOUNTS=[
  {key:'akehoshi',name:'Akehoshi',short:'Ak',color:'#FE8A23'},
  {key:'ai',name:'Ai',short:'Ai',color:'#B22222'},
  {key:'kou',name:'Kou',short:'Ko',color:'#FD1493'},
  {key:'tomose',name:'Tomose',short:'To',color:'#61C892'},
  {key:'kyoya',name:'Kyoya',short:'Ky',color:'#F09C65'},
  {key:'yuzuru',name:'Yuzuru',short:'Yu',color:'#7DA852'}
];
const STORE='bmc_collection_v1';
let ALLCARDS=[], OWNED=loadOwned(), VOICES={}, BLESS={}, REVISION={};
fetch('data/card_voices.json?v='+Date.now()).then(r=>r.json()).then(d=>{VOICES=d;}).catch(()=>{});
fetch('data/birthday_blessings.json?v='+Date.now()).then(r=>r.json()).then(d=>{BLESS=d;}).catch(()=>{});
fetch('data/revision.json?v='+Date.now()).then(r=>r.json()).then(d=>{REVISION=d;}).catch(()=>{});
let FILT={rarity:new Set(),type:new Set(),char:'',ownAccts:new Set(),sort:'release',limited:false,birthday:false,anniversary:false,reward:false};
function loadOwned(){ try{return JSON.parse(localStorage.getItem(STORE))||{}}catch(e){return {}} }
function saveOwned(){ try{localStorage.setItem(STORE,JSON.stringify(OWNED))}catch(e){} }
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function thumb(u){return (typeof u==='string')? u.replace(/\/revision\/latest(\/[^?]*)?\?/,'/revision/latest/scale-to-width-down/400?'):''}

fetch('data/events.json?v='+Date.now()).then(r=>r.json()).then(d=>{
  const seen=new Set();
  d.forEach(e=>(e.cards||[]).forEach(c=>{
    if(seen.has(c.id))return; seen.add(c.id);
    ALLCARDS.push({id:c.id,img:c.img,name:c.name,character:c.character,
      rarity:(c.rarity||'').toUpperCase(),attribute:c.attribute||'',event:e.name,limited:!!c.limited,
      birthday:(e.kind==='Birthday'),anniversary:(e.kind==='Anniversary'),reward:!!c.reward});
  }));
  buildFilters(); renderCards();
}).catch(err=>{document.getElementById('cardgrid').innerHTML='<p>Could not load data: '+err.message+'</p>'});

function buildFilters(){
  const rars=['SSR','XR','SR','R','CR'].filter(r=>ALLCARDS.some(c=>c.rarity===r));
  document.getElementById('f-rarity').innerHTML=rars.map(r=>`<button class="segbtn" data-r="${r}">${r}</button>`).join('');
  const types=['Star','Moon','Sun'].filter(t=>ALLCARDS.some(c=>c.attribute===t));
  document.getElementById('f-type').innerHTML=types.map(t=>`<button class="segbtn" data-t="${t}">${t}</button>`).join('');
  const charSet=new Set();
  ALLCARDS.forEach(c=>{(c.character||'').split(',').forEach(x=>{x=x.trim(); if(x)charSet.add(x);});});
  const chars=[...charSet].sort();
  document.getElementById('f-char').innerHTML='<option value="">All characters</option>'+chars.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  const SORTS=[['release','Newest'],['rarity','Rarity'],['character','Character'],['type','Type'],['name','Name']];
  document.getElementById('f-sort').innerHTML=SORTS.map(([v,l],i)=>`<button class="segbtn${i===0?' on':''}" data-s="${v}">${l}</button>`).join('');
  document.getElementById('ownCircles').innerHTML=ACCOUNTS.map(a=>
    `<button class="ownc" data-acct="${a.key}" title="${a.name}" style="--ac:${a.color}"></button>`).join('');
  document.querySelectorAll('#f-rarity .segbtn').forEach(b=>b.onclick=()=>{tog(FILT.rarity,b.dataset.r,b);renderCards();});
  document.querySelectorAll('#f-type .segbtn').forEach(b=>b.onclick=()=>{tog(FILT.type,b.dataset.t,b);renderCards();});
  document.getElementById('f-char').onchange=e=>{FILT.char=e.target.value;renderCards();};
  document.getElementById('f-limited').onclick=function(){this.classList.toggle('on');FILT.limited=this.classList.contains('on');renderCards();};
  document.getElementById('f-birthday').onclick=function(){this.classList.toggle('on');FILT.birthday=this.classList.contains('on');renderCards();};
  document.getElementById('f-anniversary').onclick=function(){this.classList.toggle('on');FILT.anniversary=this.classList.contains('on');renderCards();};
  document.getElementById('f-reward').onclick=function(){this.classList.toggle('on');FILT.reward=this.classList.contains('on');renderCards();};
  document.querySelectorAll('#f-sort .segbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#f-sort .segbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); FILT.sort=b.dataset.s; renderCards();
  });
  document.querySelectorAll('#ownCircles .ownc').forEach(b=>b.onclick=()=>{tog(FILT.ownAccts,b.dataset.acct,b);renderCards();});
  document.getElementById('clearFilters').onclick=()=>{
    FILT={rarity:new Set(),type:new Set(),char:'',ownAccts:new Set(),sort:FILT.sort,limited:false,birthday:false,anniversary:false,reward:false};
    document.querySelectorAll('.segbtn.on,.ownc.on').forEach(x=>x.classList.remove('on'));
    ['f-limited','f-birthday','f-anniversary'].forEach(id=>{const b=document.getElementById(id);if(b)b.classList.remove('on');});
    const sf=document.querySelector('#f-sort .segbtn'); if(sf)sf.classList.add('on');
    FILT.sort='release';
    document.getElementById('f-char').value=''; renderCards();
  };
  document.getElementById('exportBtn').onclick=exportData;
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=importData;
}
function tog(set,val,btn){ if(set.has(val)){set.delete(val);btn.classList.remove('on');}else{set.add(val);btn.classList.add('on');} }

function passFilter(c){
  if(FILT.rarity.size && !FILT.rarity.has(c.rarity)) return false;
  if(FILT.type.size && !FILT.type.has(c.attribute)) return false;
  if(FILT.char && !(c.character||'').split(',').map(x=>x.trim()).includes(FILT.char)) return false;
  if(FILT.limited && !c.limited) return false;
  if(FILT.birthday && !c.birthday) return false;
  if(FILT.anniversary && !c.anniversary) return false;
  if(FILT.reward && !c.reward) return false;
  if(FILT.ownAccts.size){
    const own=OWNED[c.id]||{}; const accts=[...FILT.ownAccts];
    if(!accts.some(k=>own[k])) return false;
  }
  return true;
}
function renderCards(){
  const RORD={SSR:0,XR:1,CR:2,SR:3,R:4};
  let list=ALLCARDS.filter(passFilter);
  const s=FILT.sort;
  if(s==='rarity') list.sort((a,b)=>(RORD[a.rarity]??9)-(RORD[b.rarity]??9)||a.id-b.id);
  else if(s==='character') list.sort((a,b)=>(a.character||'').localeCompare(b.character||'')||a.id-b.id);
  else if(s==='type') list.sort((a,b)=>(a.attribute||'').localeCompare(b.attribute||'')||a.id-b.id);
  else if(s==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  else list.sort((a,b)=>b.id-a.id);
  document.getElementById('cardcount').textContent=list.length+' / '+ALLCARDS.length+' cards';
  document.getElementById('cardgrid').innerHTML=list.map(c=>{
    const own=OWNED[c.id]||{};
    const owners=ACCOUNTS.filter(a=>own[a.key]);
    const dots=owners.map(a=>`<span class="oi" style="background:${a.color}" title="${a.name}"></span>`).join('');
    return `<div class="ccard ${owners.length?'owned':''}" data-card="${c.id}">
      <div class="ccimg">
        <img loading="lazy" src="${thumb(c.img)}">
        <div class="cctop">
          ${c.rarity?`<span class="rar r-${c.rarity}">${c.rarity}</span>`:''}
          ${c.attribute?`<span class="attr a-${c.attribute.toLowerCase()}">${c.attribute}</span>`:''}
          ${c.reward?`<span class="rwd">REWARD</span>`:c.anniversary?`<span class="anniv">ANNIVERSARY</span>`:c.birthday?`<span class="bday">BIRTHDAY</span>`:c.limited?`<span class="lim">LIMITED</span>`:''}
          ${owners.length?`<span class="ownmark">✓</span>`:''}
        </div>
        <div class="ccbot">
          <div class="ccname">${esc(c.name||'')}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.ccard').forEach(el=>el.onclick=()=>openModal(el.dataset.card));
}
function blessHTML(cid){
  const b=BLESS[String(cid)]; if(!b||!b.length) return '';
  const icons=b.map(x=>`<button class="sdbtn" data-src="${x.voice}" title="${x.char}">
    <img src="${x.sd.replace(/\/revision\/latest$/,'/revision/latest/scale-to-width-down/80')}" loading="lazy" referrerpolicy="no-referrer"></button>`).join('');
  return `<div class="voices"><div class="vtitle">Staff's Blessing</div><div class="sdgrid">${icons}</div></div>`;
}
function revHTML(cid){
  const r=REVISION[String(cid)]; if(!r) return '';
  const ranks=[]; 
  if(r.outfit) ranks.push({n:'Rank 1',src:r.outfit,gif:false});
  if(r.chibi) ranks.push({n:'Rank 2',src:r.chibi,gif:false});
  if(r.live) ranks.push({n:'Rank 3',src:r.live,gif:true});
  if(!ranks.length) return '';
  const tabs=ranks.map((x,i)=>`<button class="revtab ${i===0?'on':''}" data-src="${x.src}" data-gif="${x.gif}">${x.n}</button>`).join('');
  const first=ranks[0];
  const firstImg=first.gif?`<button class="livebtn" data-src="${first.src}">▶ Load Live2D</button>`:`<img class="revimg" src="${first.src}" referrerpolicy="no-referrer">`;
  return `<div class="voices"><div class="vtitle">Revision</div><div class="revtabs">${tabs}</div><div class="revview">${firstImg}</div></div>`;
}
function voicesHTML(cid){
  const v=VOICES[String(cid)]; if(!v) return '';
  const LB={home_1:'Voice 1',home_2:'Voice 2',home_3:'Voice 3',home_4:'Voice 4',skill:'Skill',skill_combi:'Skill · Combo'};
  const ORD=['home_1','home_2','home_3','home_4','skill','skill_combi'];
  let keys=ORD.filter(k=>v[k]);
  Object.keys(v).forEach(k=>{if(!keys.includes(k))keys.push(k);});
  if(!keys.length) return '';
  const play=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const rows=keys.map(k=>`<button class="vbtn" data-src="${v[k]}"><span class="vico">${play}</span><span class="vlab">${LB[k]||k}</span></button>`).join('');
  return `<div class="voices"><div class="vtitle">Voice Lines</div><div class="vlist">${rows}</div></div>`;
}
let VAUDIO=null, VCUR=null;
function bindLive(root){
  root.querySelectorAll('.livebtn').forEach(b=>b.onclick=()=>{
    b.parentElement.innerHTML='<img class="revimg" src="'+b.dataset.src+'" referrerpolicy="no-referrer" alt="Live2D">';
  });
}
function bindVoices(){
  document.querySelectorAll('.revtab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.revtab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    const view=t.closest('.voices').querySelector('.revview');
    if(t.dataset.gif==='true'){ view.innerHTML='<button class="livebtn" data-src="'+t.dataset.src+'">▶ Load Live2D</button>'; bindLive(view); }
    else{ view.innerHTML='<img class="revimg" src="'+t.dataset.src+'" referrerpolicy="no-referrer">'; }
  });
  bindLive(document);
  document.querySelectorAll('.vbtn,.sdbtn').forEach(b=>b.onclick=async()=>{
    const src=b.dataset.src;
    if(VAUDIO && VCUR===b){ VAUDIO.pause(); VAUDIO=null; VCUR=null; b.classList.remove('playing'); return; }
    if(VAUDIO){ VAUDIO.pause(); if(VCUR)VCUR.classList.remove('playing'); }
    VCUR=b; b.classList.add('playing');
    try{
      const resp=await fetch(src,{referrerPolicy:'no-referrer'});
      const blob=await resp.blob();
      const a=new Audio(URL.createObjectURL(blob)); VAUDIO=a;
      a.play().catch(()=>{});
      a.onended=()=>{ b.classList.remove('playing'); if(VAUDIO===a){VAUDIO=null;VCUR=null;} URL.revokeObjectURL(a.src); };
    }catch(e){ b.classList.remove('playing'); if(VCUR===b){VCUR=null;} }
  });
}
function openModal(id){
  const c=ALLCARDS.find(x=>String(x.id)===String(id)); if(!c)return;
  const own=OWNED[c.id]||{};
  document.getElementById('modalBody').innerHTML=`
    <a class="modalimg" href="${c.img}" target="_blank" rel="noopener"><img src="${thumb(c.img)}"></a>
    <div class="modalinfo">
      <div class="cc-tags">${c.rarity?`<span class="rar r-${c.rarity}">${c.rarity}</span>`:''}${c.attribute?`<span class="attr a-${c.attribute.toLowerCase()}">${c.attribute}</span>`:''}${c.reward?`<span class="rwd">REWARD</span>`:c.anniversary?`<span class="anniv">ANNIVERSARY</span>`:c.birthday?`<span class="bday">BIRTHDAY</span>`:c.limited?`<span class="lim">LIMITED</span>`:''}</div>
      <div class="modalname">${esc(c.name||'')}</div>
      <div class="modalchar">${esc(c.character||'')}</div>
      <div class="modalevent">${esc(c.event||'')}</div>
      ${voicesHTML(c.id)}
      ${revHTML(c.id)}
      ${blessHTML(c.id)}
      <div class="ownrow">${ACCOUNTS.map(a=>`
        <button class="ocircle ${own[a.key]?'on':''}" data-card="${c.id}" data-acct="${a.key}"
          title="${a.name}" style="--ac:${a.color}"></button>`).join('')}</div>
    </div>`;
  document.getElementById('modal').classList.add('show');
  bindVoices();
  document.querySelectorAll('.ocircle').forEach(b=>b.onclick=()=>{
    const cid=b.dataset.card,k=b.dataset.acct;
    OWNED[cid]=OWNED[cid]||{}; if(OWNED[cid][k]){delete OWNED[cid][k];}else{OWNED[cid][k]=true;}
    saveOwned(); b.classList.toggle('on');
  });
}
function closeModal(){if(VAUDIO){VAUDIO.pause();VAUDIO=null;VCUR=null;} document.getElementById('modal').classList.remove('show'); renderCards();}
function exportData(){
  const blob=new Blob([JSON.stringify(OWNED,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='bmc_collection_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href);
}
function importData(e){
  const f=e.target.files[0]; if(!f)return; const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); if(typeof d==='object'){OWNED=d;saveOwned();renderCards();alert('Collection imported.');} }
    catch(err){alert('Invalid file: '+err.message);} };
  rd.readAsText(f); e.target.value='';
}
</script>
</body></html>
