<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="favicon.svg"><title>Event · Break My Case Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head><body>
<div class="topbar">
  <a href="index.html">← Timeline</a>
  <span class="src" id="srclink"></span>
</div>

<div id="app"><p class="wrap mono">Loading event…</p></div>

<div id="modal" class="modal" onclick="if(event.target===this)closeModal()">
  <div class="modalbox">
    <button class="modalclose" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<footer>Banners, card art &amp; voice clips © respective owners, streamed from Fandom's CDN. Personal archive.</footer>

<script>
const DEPT={adm:'Administration',neg:'Negotiation',sim:'Simulation',mof:'Main Office',
  wat:'Watchdogs',spe:'Special Task',stf:'Special Task'};
const ACCOUNTS=[{key:'akehoshi',name:'akehoshi',color:'#FE8A23'},{key:'ai',name:'ai',color:'#B22222'},
  {key:'kou',name:'kou',color:'#FD1493'},{key:'tomose',name:'tomose',color:'#61C892'},
  {key:'kyoya',name:'kyoya',color:'#F09C65'},{key:'yuzuru',name:'yuzuru',color:'#7DA852'}];
const STORE='bmc_collection_v1';
let OWNED=loadOwned(), VOICES={}, BLESS={}, REVISION={}, ECARDS={};
function loadOwned(){try{return JSON.parse(localStorage.getItem(STORE))||{}}catch(e){return{}}}
function saveOwned(){try{localStorage.setItem(STORE,JSON.stringify(OWNED))}catch(e){}}
fetch('data/card_voices.json?v='+Date.now()).then(r=>r.json()).then(d=>{VOICES=d}).catch(()=>{});
fetch('data/birthday_blessings.json?v='+Date.now()).then(r=>r.json()).then(d=>{BLESS=d}).catch(()=>{});
fetch('data/revision.json?v='+Date.now()).then(r=>r.json()).then(d=>{REVISION=d}).catch(()=>{});
const id=parseInt(new URLSearchParams(location.search).get('id'),10);
fetch('data/events.json?v='+Date.now()).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status+' loading events.json');return r.json();}).then(all=>{
  const byId={}; all.forEach(e=>byId[e.id]=e);
  const e=byId[id];
  if(!e){document.getElementById('app').innerHTML='<p class="wrap">Event not found (id='+id+'). <a href="index.html">Back to timeline</a></p>';return;}
  try{ render(e, all); }
  catch(err){ document.getElementById('app').innerHTML='<p class="wrap">Render error: '+err.message+'</p>'; }
}).catch(err=>{
  document.getElementById('app').innerHTML='<p class="wrap">Could not load event data: '+err.message+'</p>';
});
function render(e, all){
  const sorted=[...all].sort((a,b)=>(a.start||'').localeCompare(b.start||''));
  const i=sorted.findIndex(x=>x.id===e.id);
  const prev=sorted[i-1], next=sorted[i+1];
  document.title=e.name+' · Break My Case Archive';
  const live='https://breakmycase.fandom.com/wiki/'+encodeURIComponent((e.title||'').replace(/ /g,'_'));
  document.getElementById('srclink').innerHTML='source: <a href="'+live+'" target="_blank" rel="noopener">breakmycase.fandom.com</a>';

  const dept=DEPT[e.dept]||''; const kind=e.kind||'Event';
  const tags=`<span class="tag2 kind">${esc(kind)}</span>`+(dept?`<span class="tag2 dept">${esc(dept)}</span>`:'')
    +(e.attribute?`<span class="tag2">${esc(e.attribute)}</span>`:'')
    +(e.limited?`<span class="tag2 limited">LIMITED</span>`:'');

  const pv = e.pv ? `<div class="ev-sec"><h2>Event PV</h2>
     <div class="pv-wrap"><iframe src="https://www.youtube.com/embed/${e.pv.yt}" title="Event PV" loading="lazy" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div></div>` : '';

  const song = '';

  const RRANK={XR:0,SSR:1,SR:2,CR:3,R:4};
  const sortedCards = e.cards? [...e.cards].sort((a,b)=>{
      const ra=RRANK[(a.rarity||'').toUpperCase()]??9, rb=RRANK[(b.rarity||'').toUpperCase()]??9;
      return ra-rb || ((a.id||0)-(b.id||0));
    }) : [];
  const cards = (sortedCards.length)? `<div class="ev-sec"><h2>Cards &middot; ${sortedCards.length}</h2>
    <div class="cardgrid2">${sortedCards.map(c=>{
      const img = (typeof c==='string')? c : c.img;
      const rar = (c.rarity||'').toUpperCase();
      const attr = c.attribute||'';
      const char = c.character||'';
      const nm = c.name||'';
      ECARDS[c.id]={id:c.id,img:img,name:nm,character:char,rarity:rar,attribute:attr,
        event:e.name,limited:!!c.limited,reward:!!c.reward,
        birthday:(e.kind==='Birthday'),anniversary:(e.kind==='Anniversary')};
      return `<div class="ecard" onclick="openModal(${c.id})">
        <div class="ecimg">
          <img loading="lazy" src="${thumb(img)}">
          <div class="ectop">${rar?`<span class="rar r-${rar}">${esc(rar)}</span>`:''}${attr?`<span class="attr a-${esc(attr.toLowerCase())}">${esc(attr)}</span>`:''}${c.reward?`<span class="rwd">REWARD</span>`:''}</div>
          <div class="ecbot">
            ${char?`<div class="ecchar">${esc(char)}</div>`:''}
            ${nm?`<div class="ecname">${esc(nm)}</div>`:''}
          </div>
        </div>
      </div>`;}).join('')}</div></div>`:'';


  const story='';


  document.getElementById('app').innerHTML=`
    <div class="ev-head">
      <div class="date">${e.start_disp||''}${e.end_disp?' – '+e.end_disp:''}</div>
      <h1>${esc(e.name||e.title)}</h1>
      ${e.kanji?`<div class="kanji">${esc(e.kanji)}</div>`:''}
      <div class="tags">${tags}</div>
    </div>
    ${pv}${song}${cards}${story}
    <div class="prevnext">
      ${prev?`<a href="event.html?id=${prev.id}">← ${esc(prev.name||prev.title)}</a>`:'<span></span>'}
      ${next?`<a href="event.html?id=${next.id}" style="text-align:right">${esc(next.name||next.title)} →</a>`:'<span></span>'}
    </div>`;
}
function thumb(u){ if(u&&typeof u==='object') u=u.img; return (typeof u==='string')? u.replace(/\/revision\/latest(\/[^?]*)?\?/, '/revision/latest/scale-to-width-down/300?') : ''; }
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function modalthumb(u){return (typeof u==='string')? u.replace(/\/revision\/latest(\/[^?]*)?\?/,'/revision/latest/scale-to-width-down/400?'):u}
function blessHTML(cid){
  const b=BLESS[String(cid)]; if(!b||!b.length) return '';
  const icons=b.map(x=>`<button class="sdbtn" data-src="${x.voice}" title="${x.char}"><img src="${x.sd.replace(/\/revision\/latest$/,'/revision/latest/scale-to-width-down/80')}" loading="lazy" referrerpolicy="no-referrer"></button>`).join('');
  return `<div class="voices"><div class="vtitle">Staff's Blessing</div><div class="sdgrid">${icons}</div></div>`;
}
function revHTML(cid){
  const r=REVISION[String(cid)]; if(!r) return '';
  const ranks=[]; 
  if(r.outfit) ranks.push({n:'Rank 1',src:r.outfit,gif:false});
  if(r.chibi) ranks.push({n:'Rank 2',src:r.chibi,gif:false});
  if(r.live) ranks.push({n:'Rank 3',src:r.live,gif:true});
  if(!ranks.length) return '';
  const tabs=ranks.map((x,i)=>`<button class="revtab ${i===0?'on':''}" data-src="${x.src}" data-gif="${x.gif}">${x.n}</button>`).join('');
  const first=ranks[0];
  const firstImg=first.gif?`<button class="livebtn" data-src="${first.src}">▶ Load Live2D</button>`:`<img class="revimg" src="${first.src}" referrerpolicy="no-referrer">`;
  return `<div class="voices"><div class="vtitle">Revision</div><div class="revtabs">${tabs}</div><div class="revview">${firstImg}</div></div>`;
}
function voicesHTML(cid){
  const v=VOICES[String(cid)]; if(!v) return '';
  const LB={home_1:'Voice 1',home_2:'Voice 2',home_3:'Voice 3',home_4:'Voice 4',skill:'Skill',skill_combi:'Skill · Combo'};
  const ORD=['home_1','home_2','home_3','home_4','skill','skill_combi'];
  let keys=ORD.filter(k=>v[k]); Object.keys(v).forEach(k=>{if(!keys.includes(k))keys.push(k)});
  if(!keys.length) return '';
  const play=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
  const rows=keys.map(k=>`<button class="vbtn" data-src="${v[k]}"><span class="vico">${play}</span><span class="vlab">${LB[k]||k}</span></button>`).join('');
  return `<div class="voices"><div class="vtitle">Voice Lines</div><div class="vlist">${rows}</div></div>`;
}
let VAUDIO=null,VCUR=null;
function bindLive(root){
  root.querySelectorAll('.livebtn').forEach(b=>b.onclick=()=>{
    b.parentElement.innerHTML='<img class="revimg" src="'+b.dataset.src+'" referrerpolicy="no-referrer" alt="Live2D">';
  });
}
function bindVoices(){
  document.querySelectorAll('.revtab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('.revtab').forEach(x=>x.classList.remove('on')); t.classList.add('on');
    const view=t.closest('.voices').querySelector('.revview');
    if(t.dataset.gif==='true'){ view.innerHTML='<button class="livebtn" data-src="'+t.dataset.src+'">▶ Load Live2D</button>'; bindLive(view); }
    else{ view.innerHTML='<img class="revimg" src="'+t.dataset.src+'" referrerpolicy="no-referrer">'; }
  });
  bindLive(document);
  document.querySelectorAll('.vbtn,.sdbtn').forEach(b=>b.onclick=async()=>{
    const src=b.dataset.src;
    if(VAUDIO&&VCUR===b){VAUDIO.pause();VAUDIO=null;VCUR=null;b.classList.remove('playing');return;}
    if(VAUDIO){VAUDIO.pause(); if(VCUR)VCUR.classList.remove('playing');}
    VCUR=b; b.classList.add('playing');
    try{
      const resp=await fetch(src,{referrerPolicy:'no-referrer'});
      const blob=await resp.blob();
      const a=new Audio(URL.createObjectURL(blob)); VAUDIO=a;
      a.play().catch(()=>{});
      a.onended=()=>{ b.classList.remove('playing'); if(VAUDIO===a){VAUDIO=null;VCUR=null;} URL.revokeObjectURL(a.src); };
    }catch(e){ b.classList.remove('playing'); if(VCUR===b){VCUR=null;} }
  });
}
function openModal(cid){
  const c=ECARDS[cid]; if(!c)return;
  const own=OWNED[c.id]||{};
  const badge=c.reward?`<span class="rwd">REWARD</span>`:c.anniversary?`<span class="anniv">ANNIVERSARY</span>`:c.birthday?`<span class="bday">BIRTHDAY</span>`:c.limited?`<span class="lim">LIMITED</span>`:'';
  document.getElementById('modalBody').innerHTML=`
    <a class="modalimg" href="${c.img}" target="_blank" rel="noopener"><img src="${modalthumb(c.img)}"></a>
    <div class="modalinfo">
      <div class="cc-tags">${c.rarity?`<span class="rar r-${c.rarity}">${c.rarity}</span>`:''}${c.attribute?`<span class="attr a-${c.attribute.toLowerCase()}">${c.attribute}</span>`:''}${badge}</div>
      <div class="modalname">${esc(c.name||'')}</div>
      <div class="modalchar">${esc(c.character||'')}</div>
      <div class="modalevent">${esc(c.event||'')}</div>
      ${voicesHTML(c.id)}
      ${revHTML(c.id)}
      ${blessHTML(c.id)}
      <div class="ownrow">${ACCOUNTS.map(a=>`
        <button class="ocircle ${own[a.key]?'on':''}" data-card="${c.id}" data-acct="${a.key}" title="${a.name}" style="--ac:${a.color}"></button>`).join('')}</div>
    </div>`;
  document.getElementById('modal').classList.add('show');
  bindVoices();
  document.querySelectorAll('.ocircle').forEach(b=>b.onclick=()=>{
    const k=b.dataset.acct, cc=b.dataset.card;
    OWNED[cc]=OWNED[cc]||{}; if(OWNED[cc][k]){delete OWNED[cc][k]}else{OWNED[cc][k]=true}
    saveOwned(); b.classList.toggle('on');
  });
}
function closeModal(){if(VAUDIO){VAUDIO.pause();VAUDIO=null;VCUR=null;} document.getElementById('modal').classList.remove('show');}
</script>
</body></html>
