<!DOCTYPE html><html lang="ko"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Break My Case · Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head><body class="hub">
<header class="hubhead">
  <div class="eyebrow">✦ Break My Case</div>
  <h1 class="hubh1">The <em>Archive</em></h1>
  <p class="hubsub">인게임 이벤트 타임라인과 카드 컬렉션. 아래에서 골라 들어가세요.</p>
</header>

<div class="hubgrid">
  <a class="hubtile" href="banner.html" style="--pastel:#ece9fb;--deep:#5b4fd6;--edge:rgba(91,79,214,.28)">
    <div class="ticon">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="10" width="36" height="12" rx="3"/>
        <rect x="6" y="26" width="36" height="12" rx="3"/>
        <line x1="12" y1="16" x2="24" y2="16"/><line x1="12" y1="32" x2="20" y2="32"/>
      </svg>
    </div>
    <div class="tname">Banner</div>
    <div class="tkr">이벤트 타임라인</div>
    <div class="tdesc">모든 이벤트와 가챠 배너를 시간순으로. 배너를 누르면 PV와 카드.</div>
    <span class="tgo">→</span>
  </a>

  <a class="hubtile" href="cards.html" style="--pastel:#fbe8f0;--deep:#c0567f;--edge:rgba(192,86,127,.28)">
    <div class="ticon">
      <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="8" width="19" height="27" rx="3" transform="rotate(-8 18 21)"/>
        <rect x="20" y="12" width="19" height="27" rx="3" transform="rotate(6 29 25)"/>
      </svg>
    </div>
    <div class="tname">Card</div>
    <div class="tkr">카드 컬렉션</div>
    <div class="tdesc">전 카드를 등급·타입·캐릭터로 필터. 계정별 소장 체크.</div>
    <span class="tgo">→</span>
  </a>
</div>

<div class="hubstats" id="hubstats"></div>

<footer class="hubfoot">
  <a href="https://breakmycase.fandom.com/wiki/Break_My_Case_Wiki" target="_blank" rel="noopener">Break My Case Wiki</a> (Fandom) 아카이브 · 개인 참고용
</footer>

<script>
fetch('data/events.json?v='+Date.now()).then(r=>r.json()).then(d=>{
  const cards=d.reduce((a,e)=>a+(e.cards?e.cards.length:0),0);
  const ds=d.map(e=>e.start_disp).filter(Boolean).sort();
  const span=(ds[0]||'').slice(0,4)+'–'+(ds[ds.length-1]||'').slice(0,4);
  document.getElementById('hubstats').innerHTML=
    `<span><b>${d.length}</b> events</span><span><b>${cards}</b> cards</span><span><b>${span}</b></span>`;
}).catch(()=>{});
</script>
</body></html>
